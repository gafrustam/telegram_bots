<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pronunciation Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #080816;
      --card-bg:     #12122a;
      --card-border: #1e1e45;
      --card-shadow: rgba(0,0,0,0.5);
      --accent:      #7c3aed;
      --accent-glow: rgba(124,58,237,0.35);
      --accent-lite: #a78bfa;
      --green:       #22c55e;
      --green-glow:  rgba(34,197,94,0.3);
      --red:         #ef4444;
      --red-glow:    rgba(239,68,68,0.3);
      --text:        #f0f0ff;
      --muted:       #8888aa;
      --radius:      22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Progress bar ──────────────────────────────────────── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.06);
      z-index: 100;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-lite));
      transition: width 0.5s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 0;
      z-index: 99;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-lite);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo-icon { font-size: 16px; }
    .counter {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── Game area ─────────────────────────────────────────── */
    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding-top: 20px;
    }

    /* ── Card stack ────────────────────────────────────────── */
    .card-stack {
      position: relative;
      width: min(340px, calc(100vw - 40px));
      height: 200px;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 28px 24px;
      box-shadow: 0 10px 40px var(--card-shadow);
      will-change: transform;
    }

    /* Ghost cards for stack depth */
    .card-ghost-2 {
      transform: translateY(14px) scale(0.90);
      opacity: 0.25;
      z-index: 1;
    }
    .card-ghost-1 {
      transform: translateY(7px) scale(0.95);
      opacity: 0.5;
      z-index: 2;
    }
    .card-main {
      z-index: 3;
      cursor: default;
    }

    /* Word text */
    .word-text {
      font-size: clamp(38px, 12vw, 58px);
      font-weight: 900;
      letter-spacing: -1.5px;
      text-align: center;
      line-height: 1;
      color: var(--text);
    }

    /* Listen button */
    .listen-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid rgba(167,139,250,0.2);
      color: var(--accent-lite);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: all 0.2s;
      outline: none;
    }
    .listen-btn:hover {
      background: rgba(124,58,237,0.12);
      border-color: var(--accent-lite);
    }
    .listen-btn:active { transform: scale(0.96); }

    /* Swipe overlays */
    .swipe-overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      z-index: 10;
    }
    .swipe-overlay-correct {
      background: rgba(34,197,94,0.18);
      border: 2px solid var(--green);
    }
    .swipe-overlay-incorrect {
      background: rgba(239,68,68,0.18);
      border: 2px solid var(--red);
    }
    .swipe-icon {
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
    }
    .swipe-overlay-correct .swipe-icon { color: var(--green); }
    .swipe-overlay-incorrect .swipe-icon { color: var(--red); }

    /* Card animations */
    @keyframes swipeRight {
      0%   { transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(140%) rotate(28deg); opacity: 0; }
    }
    @keyframes swipeLeft {
      0%   { transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(-140%) rotate(-28deg); opacity: 0; }
    }
    @keyframes cardAppear {
      0%   { transform: translateY(16px) scale(0.93); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .swiping-right { animation: swipeRight 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .swiping-left  { animation: swipeLeft  0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .card-appearing { animation: cardAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* ── Record section ────────────────────────────────────── */
    .record-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .record-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      transition: color 0.2s;
    }
    .record-label.active { color: var(--text); }

    .record-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 0 var(--accent-glow), 0 6px 24px var(--accent-glow);
      transition: transform 0.18s, box-shadow 0.18s, background 0.2s;
      outline: none;
      position: relative;
    }
    .record-btn:hover:not(:disabled) { transform: scale(1.06); }
    .record-btn:active:not(:disabled) { transform: scale(0.96); }
    .record-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .record-btn.recording {
      background: var(--red);
      box-shadow: 0 0 0 8px rgba(239,68,68,0.15), 0 6px 24px var(--red-glow);
    }
    .record-btn.loading {
      background: #2a2a4a;
      cursor: wait;
    }

    /* Pulse ring while recording */
    @keyframes pulseRing {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .record-btn.recording::before,
    .record-btn.recording::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--red);
      animation: pulseRing 1.2s ease-out infinite;
    }
    .record-btn.recording::after {
      animation-delay: 0.4s;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Result panel (bottom sheet) ───────────────────────── */
    .result-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0e0e28;
      border-top: 1px solid var(--card-border);
      border-radius: 28px 28px 0 0;
      padding: 28px 24px max(env(safe-area-inset-bottom), 28px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .result-panel.visible { transform: translateY(0); }

    .result-drag-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin-bottom: 4px;
    }

    .result-word-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .result-word {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .result-badge {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
      flex-shrink: 0;
    }
    .result-badge.correct   { background: var(--green); color: #fff; }
    .result-badge.incorrect { background: var(--red);   color: #fff; }

    .result-ipa {
      font-size: 20px;
      color: var(--accent-lite);
      font-style: italic;
      letter-spacing: 0.3px;
    }

    .result-comment {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      max-width: 310px;
    }

    .result-ai-feedback {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      font-style: italic;
      color: rgba(240,240,255,0.75);
      text-align: center;
      max-width: 310px;
      line-height: 1.5;
    }

    .next-btn {
      margin-top: 4px;
      width: 100%;
      max-width: 320px;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: all 0.18s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .next-btn:hover  { background: #6d28d9; transform: translateY(-2px); }
    .next-btn:active { transform: translateY(0); }

    /* ── Manual swipe hint ─────────────────────────────────── */
    .manual-hint {
      font-size: 11px;
      color: rgba(136,136,170,0.5);
      text-align: center;
      margin-top: -8px;
    }

    /* ── Completion screen ─────────────────────────────────── */
    .completion-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 32px 24px;
    }
    .completion-screen.visible { display: flex; }

    .completion-emoji { font-size: 72px; line-height: 1; }
    .completion-title { font-size: 26px; font-weight: 800; }
    .completion-score {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--green), var(--accent-lite));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .completion-sub {
      font-size: 15px;
      color: var(--muted);
      margin-top: -8px;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .restart-btn {
      padding: 13px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }
    .restart-btn:hover { background: #6d28d9; }
    .shuffle-btn {
      padding: 13px 28px;
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 14px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }
    .shuffle-btn:hover { background: rgba(255,255,255,0.12); }

    /* ── Error toast ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e3a;
      border: 1px solid #2e2e5a;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Header -->
<div class="header">
  <span class="logo"><span class="logo-icon">🗣</span> Pronunciation</span>
  <span class="counter" id="counter">1 / 55</span>
</div>

<!-- Game area -->
<div class="game-area" id="gameArea">
  <div class="card-stack">
    <div class="card card-ghost-2" id="ghostCard2"></div>
    <div class="card card-ghost-1" id="ghostCard1"></div>
    <div class="card card-main" id="mainCard">
      <div class="word-text" id="wordText">—</div>
      <button class="listen-btn" id="listenBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        Послушать
      </button>
      <!-- Swipe overlays -->
      <div class="swipe-overlay swipe-overlay-correct"   id="overlayCorrect">
        <span class="swipe-icon">✓</span>
      </div>
      <div class="swipe-overlay swipe-overlay-incorrect" id="overlayIncorrect">
        <span class="swipe-icon">✗</span>
      </div>
    </div>
  </div>

  <div class="record-section">
    <div class="record-label" id="recordLabel">Нажмите и произнесите слово</div>
    <button class="record-btn" id="recordBtn" aria-label="Record pronunciation">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <div class="manual-hint">← ✗ &nbsp; или пробел для записи &nbsp; ✓ →</div>
  </div>
</div>

<!-- Completion screen -->
<div class="completion-screen" id="completionScreen">
  <div class="completion-emoji" id="completionEmoji">🎉</div>
  <div class="completion-title">Тренировка завершена!</div>
  <div class="completion-score" id="completionScore">0/0</div>
  <div class="completion-sub" id="completionSub">правильных произношений</div>
  <div class="btn-row">
    <button class="shuffle-btn" onclick="startApp(true)">🔀 Ещё раз</button>
    <button class="restart-btn" onclick="startApp(false)">↩ Сначала</button>
  </div>
</div>

<!-- Result bottom sheet -->
<div class="result-panel" id="resultPanel">
  <div class="result-drag-handle"></div>
  <div class="result-word-row">
    <div class="result-word" id="resultWord"></div>
    <div class="result-badge" id="resultBadge"></div>
  </div>
  <div class="result-ipa" id="resultIpa"></div>
  <div class="result-comment" id="resultComment"></div>
  <div class="result-ai-feedback" id="resultFeedback"></div>
  <button class="next-btn" onclick="nextWord()" id="nextBtn">Следующее слово →</button>
</div>

<!-- Error toast -->
<div class="toast" id="toast"></div>

<script>
// ── Word data ───────────────────────────────────────────────────────────────
const WORDS = [
  { word:"again",       ipa:"əˈɡɛn",          comment:"Обычно произносится через [E]. [EI] допустимо, но реже." },
  { word:"answer",      ipa:"ˈɑːnsə",          comment:"W не читается." },
  { word:"arrive",      ipa:"əˈraɪv",          comment:"Через [AI]. Никакое не «аррив»." },
  { word:"as",          ipa:"æz",              comment:"Через [Z]. Если произнести через [S], получится ass — «осёл»." },
  { word:"aunt",        ipa:"ɑːnt",            comment:"U не читается." },
  { word:"autumn",      ipa:"ˈɔːtəm",          comment:"AU = [O], N не читается. «Ау» в лесу кричат, а тут не надо." },
  { word:"awful",       ipa:"ˈɔːfʊl",          comment:"AW = [O]. Снова без «ау»." },
  { word:"biscuit",     ipa:"ˈbɪskɪt",         comment:"Представьте, что буквы U тут нет. Или Limp Bizkit вспомните." },
  { word:"busy",        ipa:"ˈbɪzi",           comment:"В слове два звука [I]. «Бизнес» от этого слова, кстати." },
  { word:"cafe",        ipa:"ˈkæfeɪ",          comment:"Последняя буква читается как [EI]. Французы намудрили." },
  { word:"chocolate",   ipa:"ˈtʃɒk(ə)lɪt",    comment:"Оканчивается на [IT]. Никакой не «чоколат»." },
  { word:"close",       ipa:"kləʊz / kləʊs",   comment:"Если «закрывать» — [Z], если «близкий» — [S]." },
  { word:"clothes",     ipa:"kləʊðz",          comment:"O = [OU], буква E не читается." },
  { word:"couple",      ipa:"ˈkʌpl",           comment:"Буква O не читается, остальное по правилам." },
  { word:"cousin",      ipa:"ˈkʌzn",           comment:"Буква O не читается, остальное по правилам." },
  { word:"daughter",    ipa:"ˈdɔːtə",          comment:"Не «доча». AUGH = [O], R не читается." },

  { word:"dessert",     ipa:"dɪˈzɜːt",         comment:"Десерт. В середине [Z], ударение на последний слог." },
  { word:"earn",        ipa:"ɜːn",             comment:"Буква A не читается." },
  { word:"enough",      ipa:"ɪˈnʌf",           comment:"Буква O не читается, GH = [F]." },
  { word:"foreign",     ipa:"ˈfɒrɪn",          comment:"Буквы E и G не читаются." },
  { word:"fruit",       ipa:"fruːt",           comment:"I не читается." },
  { word:"grandmother", ipa:"ˈɡrænˌmʌðə",      comment:"D не читается." },
  { word:"guest",       ipa:"ɡɛst",            comment:"U не читается." },
  { word:"half",        ipa:"hɑːf",            comment:"L не читается." },
  { word:"heart",       ipa:"hɑːt",            comment:"Буква E не читается." },
  { word:"hotel",       ipa:"həʊˈtɛl",         comment:"Ударение на второй слог: –TEL." },
  { word:"hour",        ipa:"ˈaʊə",            comment:"Буква H не читается. Произносится как OUR." },
  { word:"instead",     ipa:"ɪnˈstɛd",         comment:"Буква A не читается." },
  { word:"island",      ipa:"ˈaɪlənd",         comment:"S не читается. Представьте iLand от Apple." },
  { word:"key",         ipa:"kiː",             comment:"EY читается как [EE], аналогично SEE, BE." },
  { word:"laugh",       ipa:"lɑːf",            comment:"U не читается, GH произносится как [F]." },
  { word:"listen",      ipa:"ˈlɪsn",           comment:"T не читается." },
  { word:"machine",     ipa:"məˈʃiːn",         comment:"Не «Машин папа». MaCHINE, ударение на второй слог." },
  { word:"mountain",    ipa:"ˈmaʊntɪn",        comment:"Буква A не читается." },
  { word:"nephew",      ipa:"ˈnɛvjuː",         comment:"Начинается с [NEV] или [NEF], EW как в слове NEW." },
  { word:"often",       ipa:"ˈɒf(t)ən",        comment:"T читается или не читается по желанию. Серьёзно." },
  { word:"once",        ipa:"wʌns",            comment:"Как ONE, только с [S] в конце." },
  { word:"police",      ipa:"pəˈliːs",         comment:"PoLIce. Ударение на второй слог." },
  { word:"quiet",       ipa:"ˈkwaɪət",         comment:"E читается." },
  { word:"quite",       ipa:"kwaɪt",           comment:"E не читается." },
  { word:"sea",         ipa:"siː",             comment:"Читается как SEE. Не надо произносить каждую букву." },
  { word:"shirt",       ipa:"ʃɜːt",            comment:"Не «SHIT с призвуком R». Аналогии: girl, bird." },
  { word:"since",       ipa:"sɪns",            comment:"Через [I], а не [AI]. Иначе похоже на science." },
  { word:"soap",        ipa:"səʊp",            comment:"Oh no, soap!" },
  { word:"soup",        ipa:"suːp",            comment:"Почти как русское «суп»." },
  { word:"stomach",     ipa:"ˈstʌmək",         comment:"O = [A], CH = [K]." },
  { word:"talk",        ipa:"tɔːk",            comment:"L не читается. «Ток-шоу» от этого слова." },
  { word:"those",       ipa:"ðəʊz",            comment:"O = [OU], TH = [ð]." },
  { word:"through",     ipa:"θruː",            comment:"OUGH = [U:]." },
  { word:"Thursday",    ipa:"ˈθɜːzdeɪ",        comment:"Думайте о букве Ё." },
  { word:"tired",       ipa:"ˈtaɪəd",          comment:"Вставьте дополнительный гласный перед D." },
  { word:"Tuesday",     ipa:"ˈtjuːzdeɪ",       comment:"Вспомните Кудряшку Сью (Curly Sue)." },
  { word:"walk",        ipa:"wɔːk",            comment:"Как TALK, только первый звук другой. L не читается." },
  { word:"year",        ipa:"jɪə",             comment:"Произносить через [Й]. Иначе вместо года — ухо." },
];

// ── State ───────────────────────────────────────────────────────────────────
let deck        = [];
let idx         = 0;
let correctCnt  = 0;
let recorder    = null;
let chunks      = [];
let recTimeout  = null;

let isRecording = false;
let isAssessing = false;
let isResult    = false;

// ── DOM ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const progressFill    = $('progressFill');
const counterEl       = $('counter');
const gameArea        = $('gameArea');
const mainCard        = $('mainCard');
const wordText        = $('wordText');
const listenBtn       = $('listenBtn');
const recordBtn       = $('recordBtn');
const recordLabel     = $('recordLabel');
const overlayCorrect  = $('overlayCorrect');
const overlayIncorrect= $('overlayIncorrect');
const resultPanel     = $('resultPanel');
const completionScreen= $('completionScreen');
const toast           = $('toast');

// ── Init ────────────────────────────────────────────────────────────────────
function startApp(shuffle) {
  deck       = shuffle ? [...WORDS].sort(() => Math.random() - 0.5) : [...WORDS];
  idx        = 0;
  correctCnt = 0;
  completionScreen.classList.remove('visible');
  gameArea.style.display = '';
  showCard();
  updateHUD();
}

function showCard() {
  const w = deck[idx];
  wordText.textContent    = w.word;
  overlayCorrect.style.opacity   = '0';
  overlayIncorrect.style.opacity = '0';
  mainCard.className      = 'card card-main';
  setRecordIdle();
  isResult    = false;
  isRecording = false;
  isAssessing = false;
}

function updateHUD() {
  const total = deck.length;
  counterEl.textContent          = `${idx + 1} / ${total}`;
  progressFill.style.width       = `${(idx / total) * 100}%`;
}

// ── Listen (TTS) ─────────────────────────────────────────────────────────────
listenBtn.addEventListener('click', e => {
  e.stopPropagation();
  const w = deck[idx];
  const utt = new SpeechSynthesisUtterance(w.word);
  utt.lang  = 'en-US';
  utt.rate  = 0.75;
  window.speechSynthesis.speak(utt);
});

// ── Record controls ──────────────────────────────────────────────────────────
function setRecordIdle() {
  recordBtn.className   = 'record-btn';
  recordBtn.disabled    = false;
  recordBtn.innerHTML   = iconMic();
  recordLabel.textContent = 'Нажмите и произнесите слово';
  recordLabel.classList.remove('active');
}

function iconMic() {
  return `<svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
  </svg>`;
}

function iconStop() {
  return `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
    <rect x="6" y="6" width="12" height="12" rx="3"/>
  </svg>`;
}

async function toggleRecording() {
  if (isAssessing || isResult) return;
  if (isRecording) { stopRec(); return; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks  = [];
    recorder = new MediaRecorder(stream, { mimeType: bestMime() });
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      submitAudio(new Blob(chunks, { type: recorder.mimeType }));
    };

    recorder.start();
    isRecording = true;
    recordBtn.className     = 'record-btn recording';
    recordBtn.innerHTML     = iconStop();
    recordLabel.textContent = 'Слушаю… нажмите ещё раз, чтобы остановить';
    recordLabel.classList.add('active');

    // Auto-stop after 8 s
    recTimeout = setTimeout(() => { if (isRecording) stopRec(); }, 8000);

  } catch (err) {
    showToast('Нет доступа к микрофону 😞');
  }
}

function stopRec() {
  if (!isRecording || !recorder) return;
  clearTimeout(recTimeout);
  recorder.stop();
  isRecording = false;
  isAssessing = true;
  recordBtn.className  = 'record-btn loading';
  recordBtn.disabled   = true;
  recordBtn.innerHTML  = `<div class="spinner"></div>`;
  recordLabel.textContent = 'Оцениваю произношение…';
  recordLabel.classList.add('active');
}

function bestMime() {
  for (const t of ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'])
    if (MediaRecorder.isTypeSupported(t)) return t;
  return 'audio/webm';
}

// ── Submit & assess ──────────────────────────────────────────────────────────
async function submitAudio(blob) {
  const w    = deck[idx];
  const form = new FormData();
  const ext  = blob.type.includes('ogg') ? 'ogg' : blob.type.includes('mp4') ? 'mp4' : 'webm';
  form.append('audio',   blob, `rec.${ext}`);
  form.append('word',    w.word);
  form.append('ipa',     w.ipa);
  form.append('comment', w.comment);

  try {
    const res  = await fetch('/pronunciation/api/assess', { method: 'POST', body: form });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    isAssessing = false;
    triggerResult(data.correct, data.feedback || '');
  } catch (err) {
    isAssessing = false;
    showToast('Ошибка сети. Попробуйте ещё раз.');
    setRecordIdle();
  }
}

// ── Result & swipe ────────────────────────────────────────────────────────────
function triggerResult(correct, feedback) {
  isResult = true;
  if (correct) correctCnt++;

  // Flash overlay
  const ov = correct ? overlayCorrect : overlayIncorrect;
  ov.style.opacity = '1';

  setTimeout(() => {
    mainCard.classList.add(correct ? 'swiping-right' : 'swiping-left');
    setTimeout(() => openResultPanel(correct, feedback), 180);
  }, 200);
}

function openResultPanel(correct, feedback) {
  const w = deck[idx];
  $('resultWord').textContent = w.word;

  const badge = $('resultBadge');
  badge.textContent = correct ? '✓' : '✗';
  badge.className   = `result-badge ${correct ? 'correct' : 'incorrect'}`;

  $('resultIpa').textContent     = `/${w.ipa}/`;
  $('resultComment').textContent = w.comment;

  const fbEl = $('resultFeedback');
  if (feedback) { fbEl.textContent = feedback; fbEl.style.display = ''; }
  else           { fbEl.style.display = 'none'; }

  resultPanel.classList.add('visible');
}

// ── Next word ─────────────────────────────────────────────────────────────────
function nextWord() {
  resultPanel.classList.remove('visible');
  idx++;

  if (idx >= deck.length) {
    setTimeout(showCompletion, 350);
    return;
  }

  updateHUD();
  setTimeout(() => {
    showCard();
    mainCard.classList.add('card-appearing');
  }, 300);
}

// ── Completion ────────────────────────────────────────────────────────────────
function showCompletion() {
  gameArea.style.display = 'none';
  completionScreen.classList.add('visible');
  progressFill.style.width = '100%';
  counterEl.textContent    = `${deck.length} / ${deck.length}`;

  const pct = Math.round((correctCnt / deck.length) * 100);
  $('completionScore').textContent = `${correctCnt} / ${deck.length}`;
  $('completionSub').textContent   = `${pct}% правильных произношений`;
  $('completionEmoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
}

// ── Manual controls ───────────────────────────────────────────────────────────
// Arrow keys: manual mark;  Space: toggle record;  Enter: next
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !isResult) {
    e.preventDefault();
    toggleRecording();
  }
  if (e.code === 'Enter' && isResult) {
    nextWord();
  }
  if (!isRecording && !isAssessing && !isResult) {
    if (e.code === 'ArrowRight') triggerResult(true,  'Отмечено вручную ✓');
    if (e.code === 'ArrowLeft')  triggerResult(false, 'Отмечено вручную ✗');
  }
});

recordBtn.addEventListener('click', toggleRecording);

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
startApp(true);  // start with shuffled deck
</script>
</body>
</html>
